<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DonatBoss</title>
    <meta name="description" content="DonatBoss - versi tanpa build tools (React via CDN + Supabase Auth + RLS + Realtime)." />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="root"></div>

    <!-- React via CDN (tanpa npm / tanpa folder) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

    <!-- Supabase JS (UMD) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- Konfigurasi (ISI sendiri) -->
    <script src="./config.js"></script>

    <!-- Inisialisasi Supabase client -->
    <script src="./supabaseClient.js"></script>

    <!-- App (hasil build, tanpa Babel) -->
    <script src="./app.bundle.js"></script>
  </body>
</html>
